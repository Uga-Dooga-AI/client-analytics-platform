version: 2

models:
  - name: fact_experiment_exposure
    description: >
      Первая экспозиция устройства на A/B эксперимент из AppMetrica ab_* событий.
      Один ряд = (device_id, experiment_id, variant) — первый факт экспозиции.
      Дедупликация по MIN(exposed_at). Партиционировано по exposure_date.
      Источник: stg_appmetrica__ab_events. Связано с UGAA-1507.
    columns:
      - name: exposure_id
        description: >
          Суррогатный ключ (MD5 от device_id | experiment_id | variant).
          Детерминированный, используется для JOIN с другими mart.
        tests:
          - not_null
          - unique
      - name: device_id
        description: Уникальный ID устройства в AppMetrica
        tests:
          - not_null
      - name: user_id
        description: Клиентский user_id; пустая строка для анонимных сессий
        tests:
          - not_null
      - name: app_id
        description: ID приложения в AppMetrica
        tests:
          - not_null
      - name: experiment_id
        description: Идентификатор эксперимента (часть имени события после 'ab_')
        tests:
          - not_null
      - name: variant
        description: Вариант эксперимента из JSON параметра variant_key
      - name: first_exposure_at
        description: Timestamp первой экспозиции (UTC)
        tests:
          - not_null
      - name: exposure_date
        description: Дата первой экспозиции (UTC) — ключ партиционирования
        tests:
          - not_null
      - name: os_name
        description: Операционная система при первой экспозиции (ios / android)
      - name: app_version
        description: Версия приложения при первой экспозиции
      - name: country_code
        description: ISO-код страны при первой экспозиции

  - name: mart_experiment_daily
    description: >
      Дневная агрегация результатов A/B-экспериментов.
      Источник экспозиции — AppMetrica events с префиксом ab_* (Firebase Remote Config).
      Источник экспозиции: fact_experiment_exposure; revenue и guardrails
      считаются по post-exposure событиям за настраиваемое окно.
      Grain: experiment_id × variant × date × app_id × os_name × country_code.
    columns:
      - name: experiment_id
        description: Идентификатор эксперимента (часть имени события после 'ab_')
        tests:
          - not_null
      - name: variant
        description: Вариант эксперимента (значение параметра variant_key из event_json)
        tests:
          - not_null
      - name: date
        description: Дата события (UTC)
        tests:
          - not_null
      - name: app_id
        description: ID приложения в AppMetrica
        tests:
          - not_null
      - name: os_name
        description: Операционная система экспонированной когорты
        tests:
          - not_null
      - name: country_code
        description: ISO-код страны экспонированной когорты
        tests:
          - not_null
      - name: exposures
        description: Количество уникальных устройств, получивших экспозицию в этот день
      - name: activations
        description: Количество уникальных устройств, совершивших целевое действие в день экспозиции
      - name: revenue
        description: Выручка по post-exposure revenue events за окно атрибуции
      - name: guardrail_crashes
        description: Количество уникальных устройств с crash-событием в день экспозиции
      - name: guardrail_errors
        description: Количество уникальных устройств с error-событием в день экспозиции

  - name: mart_funnel_daily
    description: >
      Дневная воронка по шагам.
      Grain: funnel_id × step_name × date.
      Определения воронок — hardcoded заглушки; перенести в seeds/funnel_definitions.csv.
    columns:
      - name: funnel_id
        description: Идентификатор воронки (например onboarding, subscription)
        tests:
          - not_null
      - name: step_name
        description: Название шага воронки
        tests:
          - not_null
      - name: step_order
        description: Порядковый номер шага (начиная с 1)
        tests:
          - not_null
      - name: date
        description: Дата события (UTC)
        tests:
          - not_null
      - name: entries
        description: Количество уникальных устройств, достигших этого шага
      - name: drop_off
        description: Количество устройств, не перешедших на следующий шаг
      - name: conversions
        description: Конверсия из предыдущего шага (0–1)

  - name: mart_cohort_daily
    description: >
      Дневные когорты удержания и LTV.
      Когорта определяется днём установки устройства из AppMetrica installs.
      LTV строится как cumulative revenue per cohort user.
      Grain: cohort_id × cohort_date × period_day × os_name × country_code × tracker_name.
    columns:
      - name: cohort_id
        description: Идентификатор когорты (сегмент; сейчас 'default')
        tests:
          - not_null
      - name: cohort_date
        description: Дата первой активности когорты
        tests:
          - not_null
      - name: period_day
        description: День с момента первой активности (0 = день установки)
        tests:
          - not_null
      - name: users
        description: Размер когорты (количество устройств в день 0)
      - name: retained
        description: Количество устройств, активных на данный period_day
      - name: retention_rate
        description: Доля удержанных пользователей (retained / users)
      - name: ltv
        description: Накопленный LTV на period_day (cumulative revenue / users)
      - name: os_name
        description: Операционная система инсталляционной когорты
      - name: country_code
        description: ISO-код страны инсталляционной когорты
      - name: tracker_name
        description: Источник трафика / трекер инсталляции

  - name: mart_forecast_points
    description: >
      Результаты прогнозных моделей (p50/p10/p90).
      Источник: per-project forecast table, которую пишет worker
      (`{project_slug}_forecast_points` в mart dataset), после чего dbt
      собирает единый serving mart поверх этого соглашения по именованию.
      Grain: run_id × metric × date.
    columns:
      - name: run_id
        description: Идентификатор запуска forecast-модели
      - name: metric
        description: Название метрики прогноза (например dau, revenue, retention_d7)
      - name: date
        description: Дата прогноза
      - name: p50
        description: Медианный прогноз
      - name: p10
        description: Нижняя граница доверительного интервала (10-й перцентиль)
      - name: p90
        description: Верхняя граница доверительного интервала (90-й перцентиль)
      - name: generated_at
        description: Timestamp запуска модели

  - name: mart_daily_active_users
    description: >
      Daily Active Users по app_id и os_name.
      Активный пользователь = device_id с хотя бы одним событием за день.
      Grain: app_id × os_name × date. Партиционировано по date.
    columns:
      - name: date
        description: Дата активности (UTC)
        tests:
          - not_null
      - name: app_id
        description: ID приложения в AppMetrica
        tests:
          - not_null
      - name: os_name
        description: Операционная система (ios / android)
        tests:
          - not_null
      - name: dau
        description: Количество уникальных активных устройств за день
        tests:
          - not_null
      - name: dau_logged_in
        description: DAU из залогиненных пользователей (user_id != '')
      - name: total_events
        description: Общее количество событий за день
      - name: wau_rolling_7d
        description: Уникальные активные устройства за последние 7 дней включительно
      - name: mau_rolling_30d
        description: Уникальные активные устройства за последние 30 дней включительно
      - name: login_rate
        description: Доля залогиненных среди активных (dau_logged_in / dau)

  - name: mart_installs_funnel
    description: >
      Воронка: установка → первая сессия → D1 retention → D7 retention.
      Grain: install_date × os_name × tracker_name. Партиционировано по install_date.
    columns:
      - name: install_date
        description: Дата инсталляции (UTC)
        tests:
          - not_null
      - name: os_name
        description: Операционная система
        tests:
          - not_null
      - name: tracker_name
        description: Источник трафика (AppsFlyer, Organic, unknown)
        tests:
          - not_null
      - name: installed
        description: Количество новых инсталляций
        tests:
          - not_null
      - name: first_session
        description: Устройства с первой сессией в день установки или D+1
      - name: retained_d1
        description: Устройства, вернувшиеся на D+1
      - name: retained_d7
        description: Устройства, вернувшиеся на D+7
      - name: install_to_first_session_rate
        description: Конверсия установка → первая сессия (0–1)
      - name: d1_retention_rate
        description: D1 retention rate (0–1)
      - name: d7_retention_rate
        description: D7 retention rate (0–1)

  - name: mart_session_metrics
    description: >
      Агрегированные метрики сессий по дням.
      Grain: date × os_name. Партиционировано по date.
    columns:
      - name: date
        description: Дата (UTC)
        tests:
          - not_null
      - name: os_name
        description: Операционная система
        tests:
          - not_null
      - name: total_sessions
        description: Общее количество сессий за день
        tests:
          - not_null
      - name: unique_devices
        description: Уникальные устройства с сессиями
      - name: avg_session_duration_sec
        description: Средняя длительность сессии в секундах
      - name: median_session_duration_sec
        description: Медианная длительность сессии в секундах
      - name: max_session_duration_sec
        description: Максимальная длительность сессии в секундах
      - name: short_sessions
        description: Количество коротких сессий (<60 сек)
      - name: medium_sessions
        description: Количество средних сессий (60–299 сек)
      - name: long_sessions
        description: Количество длинных сессий (>=300 сек)
      - name: sessions_per_user
        description: Среднее количество сессий на активного пользователя
      - name: long_session_rate
        description: Доля длинных сессий (0–1)

  - name: mart_revenue_metrics
    description: >
      Метрики total revenue из AppMetrica revenue events
      (c_ad_revenue, purchase, in_app_purchase, subscription_start).
      Активируется только при наличии revenue событий в AppMetrica stream.
      Grain: date × os_name × country_code × app_id × product_id × currency.
      Партиционировано по date.
    columns:
      - name: date
        description: Дата транзакции (UTC)
        tests:
          - not_null
      - name: os_name
        description: Операционная система
        tests:
          - not_null
      - name: country_code
        description: ISO-код страны
      - name: app_id
        description: ID приложения
        tests:
          - not_null
      - name: product_id
        description: Идентификатор продукта/SKU (unknown если не передан)
        tests:
          - not_null
      - name: currency
        description: Валюта транзакции (по умолчанию USD)
      - name: purchase_count
        description: Количество покупок (после дедупликации по transaction_id)
      - name: paying_users
        description: Количество уникальных покупателей за день
      - name: gross_revenue
        description: Валовая выручка в исходной валюте
      - name: avg_order_value
        description: Средний чек (gross_revenue / purchase_count)
      - name: arppu
        description: ARPPU — выручка на платящего пользователя
