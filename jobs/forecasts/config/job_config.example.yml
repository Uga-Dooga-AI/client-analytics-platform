# Forecast job configuration
# Copy to job_config.yml and fill in real values before running.
# All sensitive values should be passed via environment variables, not this file.

project_slug: word-catcher

bigquery:
  # GCP project ID
  # Env var: GCP_PROJECT_ID
  project_id: REPLACE_WITH_GCP_PROJECT_ID

  # BigQuery multi-region for raw/stg/mart datasets
  location: US

  # Raw/staging datasets required for dbt rebuild before forecasting
  raw_dataset: raw
  stg_dataset: stg

  # Dataset containing dbt marts (read source)
  mart_dataset: mart

  # Source mart table for experiment time-series
  experiment_daily_table: word_catcher_experiment_daily

  # Destination table for forecast output
  forecast_table: word_catcher_forecast_points

forecast:
  # Number of days to forecast into the future
  horizon_days: 30

  # Minimum historical days required to run a forecast
  min_history_days: 14

  # Engine: "statsmodels" (short series) or "prophet" (longer series with seasonality)
  # Auto-selected based on series length if set to "auto"
  engine: auto

  # Confidence interval width (0.0–1.0)
  confidence_interval: 0.8

  # Metric set to forecast. Keep this restricted to decay-compatible metrics
  # until notebook-parity cohort forecasting lands in the runtime.
  metrics:
    - revenue

  # Bounds manifest location
  bounds_bucket: REPLACE_WITH_BUCKET_NAME
  bounds_prefix: bounds/word-catcher/

schedule:
  # UTC hour at which the daily forecast run is triggered
  # Runs after ingestion completes (ingestion: 04:00 UTC, forecasts: 05:00 UTC)
  utc_hour: 5

# Environment variables required at runtime (do not set values here):
#   GCP_PROJECT_ID                 — GCP project ID (overrides bigquery.project_id)
#   BQ_MART_DATASET                — mart dataset name (overrides bigquery.mart_dataset)
#   BQ_LOCATION                    — BigQuery location override for dbt + worker runtime
#   GOOGLE_APPLICATION_CREDENTIALS — path to service account JSON (or use Workload Identity)
#   JOB_CONFIG_PATH                — path to this config file (default: config/job_config.example.yml)
